<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GadgetSphere</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
header {
    padding:15px;
    background:#020617;
}

.logo {
    color:#00d4ff;
    font-weight:bold;
}

/* HERO */
.hero {
    text-align:center;
    padding:60px 20px;
}

.hero h1 {
    font-size:28px;
    line-height:1.4;
}

.btn {
    padding:10px 15px;
    border-radius:6px;
    text-decoration:none;
    display:inline-block;
    margin:8px;
    font-size:14px;
}

.primary {
    background:#2563eb;
    color:white;
}

.outline {
    border:1px solid #334155;
    color:white;
}

/* SECTION */
.section {
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

/* CARD */
.card {
    background:#111827;
    padding:15px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

.price {
    color:#00ff99;
}

/* GUIDE CARD */
.guide-card {
    background:#111827;
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
}

/* RESULT TITLE */
.result-title {
    padding:20px;
    font-size:18px;
}
</style>

</head>

<body>

<header>
<div class="logo">GadgetSphere</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>Find the Perfect Gadget for You</h1>
<p>Choose your need — we’ll show best options</p>

<a href="#" class="btn primary">Explore</a>
<a href="#" class="btn outline">Compare</a>
</section>

<!-- 🔥 USER DECISION -->
<section class="section">
<h2>👉 What do you need?</h2>

<div class="grid">

<div class="guide-card" onclick="filterData('Gaming')">
<h3>🎮 Gaming</h3>
<p>High performance</p>
</div>

<div class="guide-card" onclick="filterData('Camera')">
<h3>📸 Camera</h3>
<p>Best photos</p>
</div>

<div class="guide-card" onclick="filterData('Battery')">
<h3>🔋 Battery</h3>
<p>Long backup</p>
</div>

<div class="guide-card" onclick="filterData('Premium')">
<h3>💎 Premium</h3>
<p>Flagship phones</p>
</div>

<div class="guide-card" onclick="filterData('Budget')">
<h3>💰 Budget</h3>
<p>Under ₹20K</p>
</div>

</div>
</section>

<!-- RESULT -->
<div class="result-title" id="resultTitle">
🔥 Top Picks
</div>

<section class="section">
<div class="grid" id="mobileContainer"></div>
</section>

<script>

// DATA
const mobiles = [
{name:"iPhone 15",price:"₹79,999",tag:"Premium"},
{name:"Samsung S24",price:"₹69,999",tag:"Camera"},
{name:"OnePlus 12",price:"₹64,999",tag:"Gaming"},
{name:"Redmi Note 13",price:"₹24,999",tag:"Budget"},
{name:"Moto G Power",price:"₹18,999",tag:"Battery"},
{name:"iQOO Neo",price:"₹35,999",tag:"Gaming"}
];

// CREATE CARDS
function createCards(data) {
let container = document.getElementById("mobileContainer");
container.innerHTML = "";

data.forEach(item=>{
container.innerHTML += `
<div class="card">
<h3>${item.name}</h3>
<p class="price">${item.price}</p>
<p>👤 ${item.tag}</p>
<a href="#" class="btn primary">Check Price</a>
</div>
`;
});
}

// FILTER
function filterData(type) {
let filtered = mobiles.filter(p=>p.tag===type);

document.getElementById("resultTitle").innerText =
"🔥 Best " + type + " Phones";

createCards(filtered);
}

// DEFAULT LOAD
createCards(mobiles);

</script>

</body>
</html>
