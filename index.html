<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GadgetSphere</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0b1220;
  color: white;
}

.container {
  padding: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 10px;
  background: radial-gradient(circle at top, #1e3a8a, #0b1220);
  border-radius: 20px;
}

.hero h1 {
  font-size: 26px;
}

.hero p {
  color: #94a3b8;
}

.btn {
  display: block;
  margin-top: 15px;
  padding: 14px;
  background: linear-gradient(45deg, #2563eb, #3b82f6);
  border-radius: 12px;
  text-align: center;
  color: white;
  text-decoration: none;
}

/* SECTION */
.section {
  margin-top: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #111827, #0b1220);
  padding: 18px;
  border-radius: 16px;
  text-decoration: none;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card p {
  color: #94a3b8;
  font-size: 13px;
}

/* REMOVE BLUE LINKS */
a {
  color: inherit;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h1>🔥 Best Gadgets for You</h1>
  <p>Smart picks & best deals</p>
  <a href="#" class="btn">View Deals</a>
</div>

<!-- EXPLORE -->
<div class="section">
  <h2>📱 Explore Categories</h2>

  <div class="grid">

    <a href="#" class="card">
      <h3>Budget Phones</h3>
      <p>Under ₹20K</p>
    </a>

    <a href="#" class="card">
      <h3>🎮 Gaming Phones</h3>
      <p>Best for gaming</p>
    </a>

    <a href="#" class="card">
      <h3>📸 Camera Phones</h3>
      <p>Best shots</p>
    </a>

    <a href="#" class="card">
      <h3>🎮 Accessories</h3>
      <p>Under ₹999</p>
    </a>

  </div>
</div>

</div>

</body>
      </html>
