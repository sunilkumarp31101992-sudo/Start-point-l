<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GadgetSphere</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#020617;
}

.logo {
    color:#00d4ff;
    font-weight:bold;
    font-size:20px;
}

.hero {
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(135deg,#020617,#0f172a);
}

.btn {
    background:#00d4ff;
    color:black;
    padding:10px 15px;
    text-decoration:none;
    border-radius:5px;
    display:inline-block;
    margin-top:10px;
}

.section {
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.card {
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

.card img {
    width:100%;
}

.price {
    color:#00ff99;
}

.view-btn {
    text-align:center;
    margin-top:15px;
}
</style>

</head>

<body>

<header>
<div class="logo">GadgetSphere</div>
</header>

<section class="hero">
<h1>🔥 Find Best Gadgets</h1>
<p>Compare • Review • Buy Smart</p>
<a href="#" class="btn">Explore</a>
</section>

<!-- 📱 Mobiles -->
<section class="section">
<h2>📱 Mobiles</h2>
<div class="grid" id="mobileContainer"></div>
<div class="view-btn">
<a href="#" class="btn">View All</a>
</div>
</section>

<!-- 💻 Laptops -->
<section class="section">
<h2>💻 Laptops</h2>
<div class="grid" id="laptopContainer"></div>
<div class="view-btn">
<a href="#" class="btn">View All</a>
</div>
</section>

<!-- 🎧 Accessories -->
<section class="section">
<h2>🎧 Accessories</h2>
<div class="grid" id="accessoriesContainer"></div>
<div class="view-btn">
<a href="#" class="btn">View All</a>
</div>
</section>

<script>

// 📱 Mobiles
const mobiles = [
{name:"iPhone 15",price:"₹79,999",tag:"Camera"},
{name:"Samsung S24",price:"₹69,999",tag:"Performance"},
{name:"OnePlus 12",price:"₹64,999",tag:"Gaming"},
{name:"Redmi Note 13",price:"₹24,999",tag:"Budget"},
{name:"iQOO Neo",price:"₹35,999",tag:"Gaming"}
];

// 💻 Laptops
const laptops = [
{name:"HP Pavilion",price:"₹55,000",tag:"Students"},
{name:"Dell Inspiron",price:"₹60,000",tag:"Office"},
{name:"MacBook Air",price:"₹99,000",tag:"Premium"},
{name:"ASUS TUF",price:"₹75,000",tag:"Gaming"}
];

// 🎧 Accessories
const accessories = [
{name:"Headphones",price:"₹1,999",tag:"Music"},
{name:"Smartwatch",price:"₹2,499",tag:"Fitness"},
{name:"Fast Charger",price:"₹999",tag:"Fast"},
{name:"Earbuds",price:"₹1,499",tag:"Daily"},
{name:"Power Bank",price:"₹1,299",tag:"Travel"}
];

// 🔥 Create Cards
function createCards(data, id) {
let container = document.getElementById(id);
container.innerHTML = "";

data.slice(0,4).forEach(item=>{
container.innerHTML += `
<div class="card">
<img src="https://via.placeholder.com/200">
<h3>${item.name}</h3>
<p class="price">${item.price}</p>
<p>👤 ${item.tag}</p>
<a href="#" class="btn">Check Price</a>
</div>
`;
});
}

// Render
createCards(mobiles,"mobileContainer");
createCards(laptops,"laptopContainer");
createCards(accessories,"accessoriesContainer");

</script>

</body>
</html>
