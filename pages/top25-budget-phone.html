<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Top 25 Budget Phones Under ₹15000 (2026)</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    background:linear-gradient(135deg,#1e293b,#0f172a);
}

header h1{
    font-size:26px;
}

header p{
    color:#94a3b8;
}

/* TOP PICK */
.top-pick{
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    border:1px solid #334155;
}

/* FILTER */
.filters{
    text-align:center;
    margin:20px;
}

.filters button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:15px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

/* PRICE */
.price{
    color:#22c55e;
    font-weight:bold;
}

/* BUTTON */
.btn{
    display:block;
    margin-top:10px;
    padding:10px;
    background:#2563eb;
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    background:#1d4ed8;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
    font-size:12px;
}
</style>

</head>

<body>

<header>
<h1>🔥 Top 25 Budget Phones Under ₹15000</h1>
<p>Performance | Battery | Camera | Best Deals</p>
</header>

<!-- TOP PICK -->
<div class="top-pick">
<h2>🏆 Best Overall</h2>
<h3>iQOO Z7 5G</h3>
<p>⚡ Best performance under ₹15000</p>

<a class="btn" href="https://www.amazon.in/s?k=iQOO+Z7+5G&tag=gadgetsph019-21" target="_blank">
🔥 Buy Now
</a>
</div>

<!-- FILTER -->
<div class="filters">
<button>All</button>
<button>Gaming 🎮</button>
<button>Battery 🔋</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<div class="footer">
This page contains affiliate links. We may earn commission at no extra cost to you.
</div>

const tag = "gadgetsph019-21";

{name:"Redmi 13C", price:"₹10,999"},

{name:"Samsung Galaxy M14 5G", price:"₹12,990"},
{name:"iQOO Z6 Lite 5G", price:"₹13,499"},
{name:"Poco M6 5G", price:"₹10,499"},
{name:"Motorola G54 5G", price:"₹14,999"},
{name:"Vivo T1x", price:"₹11,999"},
{name:"Infinix Zero 5G", price:"₹12,499"},
{name:"Tecno Pova 5", price:"₹11,799"},
{name:"Lava Blaze 5G", price:"₹10,899"},

{name:"Realme C55", price:"₹12,999"},
{name:"Redmi Note 12 5G", price:"₹14,499"},
{name:"Samsung Galaxy F14 5G", price:"₹13,999"},
{name:"iQOO Z7 5G", price:"₹14,999"},
{name:"Poco X5 5G", price:"₹14,499"},
{name:"Motorola G73 5G", price:"₹14,999"},
{name:"Vivo Y27", price:"₹13,499"},
{name:"Infinix Note 30", price:"₹12,999"},
{name:"Realme Narzo 60 5G", price:"₹14,499"},
{name:"Redmi 12 5G", price:"₹11,499"},

{name:"Samsung Galaxy M34 5G", price:"₹14,999"},

document.getElementById("products").innerHTML =
phones.map(phone => `
<div class="card">

href="https://www.amazon.in/s?k=${encodeURIComponent(phone.name + ' smartphone')}&tag=${tag}"

🔥 Check Price
</a>

</div>
`).join("");
</script>

</body>
</html>
